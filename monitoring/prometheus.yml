global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "airflow"
    metrics_path: /metrics
    static_configs:
      - targets: ["airflow-webserver:8080"]

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "freshness_service"
    metrics_path: /metrics
    static_configs:
      - targets: ["streamlit:8501"]
