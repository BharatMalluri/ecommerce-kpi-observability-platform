name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-validate:
    name: Lint & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dbt only
        run: pip install dbt-core==1.8.0 dbt-postgres==1.8.0

      - name: dbt parse check
        run: |
          cp dbt/profiles.yml.example dbt/profiles.yml
          cd dbt && dbt deps && dbt parse || true

      - name: Python syntax check
        run: |
          python -m py_compile scripts/seed_postgres.py
          python -m py_compile streamlit/app.py
          python -m py_compile airflow/dags/ingest_orders.py
          python -m py_compile airflow/dags/run_dbt.py
          echo "All Python files syntax OK"